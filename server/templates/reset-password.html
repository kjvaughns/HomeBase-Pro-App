<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – HomeBase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      width: 52px;
      height: 52px;
      background: #2563eb;
      border-radius: 14px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 28px; height: 28px; fill: #fff; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      text-align: center;
      margin-bottom: 8px;
    }
    p.subtitle {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #2563eb; }
    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .msg.success { background: #dcfce7; color: #15803d; display: block; }
    .msg.error { background: #fee2e2; color: #b91c1c; display: block; }
    .rules { font-size: 12px; color: #999; margin-bottom: 20px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </div>
    <h1>Set a new password</h1>
    <p class="subtitle">Choose a strong password to secure your HomeBase account.</p>
    <form id="form">
      <label for="password">New password</label>
      <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required />
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Re-enter password" autocomplete="new-password" required />
      <p class="rules">Use at least 8 characters. Stronger passwords include letters, numbers, and symbols.</p>
      <button type="submit" id="btn">Reset password</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get("token");
    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    if (!token) {
      msg.className = "msg error";
      msg.textContent = "Invalid or missing reset token. Please request a new password reset link.";
      form.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      msg.className = "msg";
      msg.textContent = "";

      if (password.length < 8) {
        msg.className = "msg error";
        msg.textContent = "Password must be at least 8 characters.";
        return;
      }
      if (password !== confirm) {
        msg.className = "msg error";
        msg.textContent = "Passwords do not match.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Resetting…";

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (res.ok) {
          msg.className = "msg success";
          msg.textContent = "Password updated! You can now sign in with your new password in the HomeBase app.";
          form.style.display = "none";
        } else {
          msg.className = "msg error";
          msg.textContent = data.error || "Failed to reset password. The link may have expired.";
          btn.disabled = false;
          btn.textContent = "Reset password";
        }
      } catch {
        msg.className = "msg error";
        msg.textContent = "Network error. Please check your connection and try again.";
        btn.disabled = false;
        btn.textContent = "Reset password";
      }
    });
  </script>
</body>
</html>
